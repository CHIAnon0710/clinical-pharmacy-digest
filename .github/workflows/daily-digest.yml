name: 每日临床药理文献摘要

on:
    schedule:
      - cron: '0 23 * * *'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    smtp-test:
      name: SMTP 连通性测试
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - name: 检查 Secrets 并测试 SMTP
          env:
            SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
            SMTP_PORT: ${{ secrets.SMTP_PORT }}
            SMTP_USER: ${{ secrets.SMTP_USER }}
            SMTP_PASS: ${{ secrets.SMTP_PASS }}
            EMAIL_TO: ${{ secrets.EMAIL_TO }}
          run: |
            python << 'PYEOF'
            import os, sys, smtplib

            srv = os.environ.get('SMTP_SERVER', '')
            port = int(os.environ.get('SMTP_PORT', '465'))
            usr = os.environ.get('SMTP_USER', '')
            pwd = os.environ.get('SMTP_PASS', '')
            to_ = os.environ.get('EMAIL_TO', '')

            for k in ['SMTP_SERVER', 'SMTP_PORT', 'SMTP_USER', 'SMTP_PASS', 'EMAIL_TO']:
                v = os.environ.get(k, '')
                print(f'[CHECK] {k}: len={len(v)} first3={repr(v[:3]) if v else "EMPTY"}')
                if not v.strip():
                    print(f'[ERROR] {k} is empty!')
                    sys.exit(1)

            print(f'[SMTP] connecting {srv}:{port} ...')
            if port == 465:
                s = smtplib.SMTP_SSL(srv, port, timeout=30)
            else:
                s = smtplib.SMTP(srv, port, timeout=30)
                s.starttls()
            s.set_debuglevel(1)
            s.login(usr, pwd)
            print('[SMTP] login OK')

            raw = f'From: {usr}\r\nTo: {to_}\r\nSubject: SMTP-TEST\r\n\r\nhello'
            s.sendmail(usr, [to_], raw.encode('ascii'))
            s.quit()
            print('[SMTP] ✅ test email sent!')
            PYEOF

    collect-and-send:
      name: 采集文献并发送邮件
      needs: smtp-test
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - name: 运行文献采集与推送
          env:
            SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
            SMTP_PORT: ${{ secrets.SMTP_PORT }}
            SMTP_USER: ${{ secrets.SMTP_USER }}
            SMTP_PASS: ${{ secrets.SMTP_PASS }}
            EMAIL_TO: ${{ secrets.EMAIL_TO }}
            EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
            NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          run: python digest.py
        - name: 运行结果通知
          if: failure()
          run: |
            echo "::warning::文献日报发送失败，请检查 Secrets 配置或 PubMed API 状态"
